spring.application.name=demo
management.endpoints.web.exposure.include=*
managmement.info.env.enabled = true

info.app.name = My first spring boot app
info.app.description = Spring Application for learning spring boot.
info.app.version = 1.0.0

#spring.security.user.name=
#spring.security.user.password=

coach.name=abc
team.name=cdac

#bellow line is for adding lazy loading globally for all java component
spring.main.lazy-initialization=true

spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce
spring.datasource.username=agadmin
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update

#Turn off the spring boot baner
spring.main.banner-mode=off

#Reduce logging level, set them to warn
logging.level.root=warn

#Auto crearte the table
#spring.jpa.hibernate.ddl = create

#Spring Data Rest Properties
spring.data.rest.base-path=/api/v1
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=post-group-1
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.listener.missing-topics-fatal=false